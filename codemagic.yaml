workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Set bundle ID
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.aom.groundtransport" ios/Runner/Info.plist
      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
      - name: Package IPA
        script: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r Runner.ipa Payload
    artifacts:
      - Runner.ipa
